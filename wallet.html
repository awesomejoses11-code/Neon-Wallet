<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="Neon Wallet · Premium TON blockchain wallet">
    <meta name="theme-color" content="#FFD700">
    <meta name="color-scheme" content="dark">
    
    <title>Neon Wallet</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@ton-connect/ui@latest/dist/ton-connect-ui.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        :root {
            --gold: #FFD700;
            --deep-blue: #050816;
            --cyan: #00D2FF;
        }

        body {
            background: var(--deep-blue);
            color: #F8FAFC;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        #nebula-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        main {
            position: relative;
            z-index: 10;
        }

        .glass {
            background: rgba(11, 18, 48, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.08);
        }

        .btn-gold {
            background: linear-gradient(135deg, #FFD700 0%, #FDB931 100%);
            color: #050816;
            border: none;
            font-family: inherit;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(255, 215, 0, 0.15);
        }

        .btn-gold:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(255, 215, 0, 0.35);
        }

        .btn-gold:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #F8FAFC;
            font-family: inherit;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-outline:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 215, 0, 0.25);
        }

        .btn-outline:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        input, textarea {
            background: rgba(11, 18, 48, 0.6);
            border: 1px solid rgba(255, 215, 0, 0.08);
            color: #F8FAFC;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-family: inherit;
        }

        input::placeholder {
            color: #7A8BA8;
        }

        input:focus {
            outline: none;
            background: rgba(11, 18, 48, 0.8);
            border-color: rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 16px rgba(255, 215, 0, 0.1);
        }

        .tab-button {
            padding: 12px 24px;
            border: none;
            background: transparent;
            color: #7A8BA8;
            cursor: pointer;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }

        .tab-button.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        #toast {
            background: rgba(11, 18, 48, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        .gold-text { color: var(--gold); }
        .cyan-text { color: var(--cyan); }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #7A8BA8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <canvas id="nebula-canvas"></canvas>

    <main class="py-8 md:py-12 px-4">
        <div class="max-w-2xl mx-auto">
            <!-- Header -->
            <div class="mb-8">
                <div class="flex items-center justify-between mb-6">
                    <div>
                        <h1 class="text-4xl md:text-5xl font-bold">
                            <span class="gold-text">Neon</span> Wallet
                        </h1>
                    </div>
                    <a href="/" class="text-slate-400 hover:text-gold transition-colors">
                        <i class="fas fa-home text-xl"></i>
                    </a>
                </div>
            </div>

            <!-- Main Container -->
            <div class="glass p-6 md:p-8 space-y-6 rounded-2xl">
                <!-- Status Bar -->
                <div class="flex items-center justify-between p-4 rounded-lg bg-slate-900/20 border border-slate-700/30">
                    <div>
                        <p class="text-xs text-slate-500 uppercase">Wallet</p>
                        <p class="text-sm font-semibold mt-1" id="status-text">Initializing...</p>
                    </div>
                    <div id="wallet-avatar" class="hidden w-10 h-10 rounded-full bg-gradient-to-br from-yellow-500 to-yellow-600 flex items-center justify-center">
                        <i class="fas fa-wallet text-slate-900 text-sm"></i>
                    </div>
                </div>

                <!-- Connect Section -->
                <div id="connection-section">
                    <div class="space-y-3">
                        <button class="btn-gold w-full py-3 flex items-center justify-center gap-2 text-base" id="connect-btn" onclick="handleConnect()">
                            <i class="fas fa-plug"></i>
                            Connect TON Wallet
                        </button>
                        <p class="text-xs text-slate-400 text-center">Use Tonkeeper or another TON wallet</p>
                    </div>
                </div>

                <!-- Connected Section -->
                <div id="connected-section" class="hidden space-y-6">
                    <!-- Balance Card -->
                    <div class="p-6 rounded-xl bg-gradient-to-br from-slate-900 to-slate-800 border border-yellow-500/20">
                        <div class="text-center">
                            <p class="stat-label">Total Balance</p>
                            <p class="stat-value" id="balance-display">0.00</p>
                            <p class="text-slate-400 text-sm mt-1">TON</p>
                            <button class="text-xs text-slate-400 hover:text-gold mt-2 transition-colors" onclick="refreshBalance()">
                                <i class="fas fa-sync-alt mr-1"></i>Refresh
                            </button>
                        </div>
                    </div>

                    <!-- Address Card -->
                    <div class="glass p-4 rounded-xl">
                        <p class="text-xs text-slate-400 uppercase mb-2">Your Address</p>
                        <div class="flex gap-2">
                            <input type="text" id="wallet-address" readonly class="flex-1 bg-slate-900/50 font-mono text-xs py-2" placeholder="Loading...">
                            <button class="btn-outline px-3 py-2" onclick="copyAddress()">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Tabs -->
                    <div class="flex border-b border-slate-700/50 overflow-x-auto">
                        <button class="tab-button active" onclick="switchTab('send', event)">
                            <i class="fas fa-send mr-1"></i>Send
                        </button>
                        <button class="tab-button" onclick="switchTab('receive', event)">
                            <i class="fas fa-inbox mr-1"></i>Receive
                        </button>
                    </div>

                    <!-- Send Tab -->
                    <div id="send" class="tab-content active space-y-4">
                        <div>
                            <label class="text-xs text-slate-400 block mb-2 uppercase">To Address</label>
                            <input type="text" id="send-address" placeholder="EQDu5V..." class="w-full py-3">
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 block mb-2 uppercase">Amount (TON)</label>
                            <input type="number" id="send-amount" placeholder="0.00" class="w-full py-3" step="0.01" min="0">
                        </div>
                        <button class="btn-gold w-full py-3" id="send-btn" onclick="sendTON()">
                            <i class="fas fa-paper-plane mr-2"></i>Send
                        </button>
                    </div>

                    <!-- Receive Tab -->
                    <div id="receive" class="tab-content space-y-4">
                        <div id="qr-container" class="flex justify-center p-4 rounded-lg bg-white">
                            <!-- QR code will render here -->
                        </div>
                        <button class="btn-outline w-full py-2" onclick="copyAddress()">
                            <i class="fas fa-copy mr-2"></i>Copy Address
                        </button>
                    </div>

                    <!-- Disconnect -->
                    <button class="btn-outline w-full py-3" id="disconnect-btn" onclick="disconnectWallet()">
                        <i class="fas fa-sign-out-alt mr-2"></i>Disconnect
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 left-6 right-6 md:right-6 md:max-w-sm px-6 py-4 rounded-lg flex items-center gap-3 translate-y-20 opacity-0 pointer-events-none transition-all z-50">
        <i id="toast-icon" class="fas fa-circle-check text-xs"></i>
        <span id="toast-text" class="text-sm"></span>
    </div>

    <script>
        // ===================== CONFIG =====================
        const CONFIG = {
            nebula: { particleCount: 60, fps: 30 },
            tonconnect: {
                manifestUrl: 'https://neon-crypto-wallet.vercel.app/tonconnect-manifest.json'
            },
            api: {
                testnet: 'https://testnet.toncenter.com/api/v2',
                mainnet: 'https://toncenter.com/api/v2'
            }
        };

        // ===================== STATE =====================
        const state = {
            connected: false,
            address: null,
            balance: 0,
            connector: null,
            isLoading: false,
            network: 'testnet'
        };

        // ===================== UTILS =====================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const text = document.getElementById('toast-text');

            const iconMap = {
                success: 'circle-check',
                error: 'circle-xmark',
                loading: 'hourglass-end',
                copy: 'copy',
                warning: 'exclamation-triangle'
            };

            icon.className = `fas fa-${iconMap[type] || 'circle-check'} text-xs`;
            text.textContent = message;
            
            toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');

            clearTimeout(window.toastTimeout);
            if (type !== 'loading') {
                window.toastTimeout = setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
                }, 3000);
            }
        }

        function setLoading(loading, text = '') {
            state.isLoading = loading;
            const connectBtn = document.getElementById('connect-btn');
            const sendBtn = document.getElementById('send-btn');
            const disconnectBtn = document.getElementById('disconnect-btn');

            if (loading) {
                if (connectBtn) connectBtn.disabled = true;
                if (sendBtn) sendBtn.disabled = true;
                if (disconnectBtn) disconnectBtn.disabled = true;
                if (text) showToast(text, 'loading');
            } else {
                if (connectBtn) connectBtn.disabled = false;
                if (sendBtn) sendBtn.disabled = false;
                if (disconnectBtn) disconnectBtn.disabled = false;
            }
        }

        function switchTab(tabName, event) {
            event.preventDefault();
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.closest('.tab-button').classList.add('active');
        }

        // ===================== NEBULA =====================
        function initNebula() {
            const canvas = document.getElementById('nebula-canvas');
            const ctx = canvas.getContext('2d');
            if (!ctx) return;

            let width = window.innerWidth;
            let height = window.innerHeight;
            let particles = [];

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }

            window.addEventListener('resize', resizeCanvas, { passive: true });
            resizeCanvas();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.15;
                    this.speedY = (Math.random() - 0.5) * 0.15;
                    this.opacity = Math.random() * 0.4 + 0.1;
                    this.hue = 40 + Math.random() * 30;
                }

                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0) this.x = width;
                    if (this.x > width) this.x = 0;
                    if (this.y < 0) this.y = height;
                    if (this.y > height) this.y = 0;
                }

                draw(ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${this.opacity})`;
                    ctx.shadowColor = `hsla(${this.hue}, 80%, 70%, 0.2)`;
                    ctx.shadowBlur = 12;
                    ctx.fill();
                }
            }

            for (let i = 0; i < CONFIG.nebula.particleCount; i++) {
                particles.push(new Particle());
            }

            let lastTime = 0;
            function animate(now) {
                if (now - lastTime < 1000 / CONFIG.nebula.fps) {
                    requestAnimationFrame(animate);
                    return;
                }

                lastTime = now;
                ctx.clearRect(0, 0, width, height);

                particles.forEach(p => {
                    p.update();
                    p.draw(ctx);
                });

                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, width * 0.6);
                grad.addColorStop(0, 'rgba(255,215,0,0.02)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);

                requestAnimationFrame(animate);
            }

            requestAnimationFrame(animate);
        }

        // ===================== TON CONNECT =====================
        async function initTonConnect() {
            return new Promise((resolve) => {
                const checkTonConnectUI = setInterval(() => {
                    if (typeof TonConnectUI !== 'undefined') {
                        clearInterval(checkTonConnectUI);
                        try {
                            const tonConnectUI = new TonConnectUI({
                                manifestUrl: CONFIG.tonconnect.manifestUrl
                            });
                            resolve(tonConnectUI);
                        } catch (error) {
                            console.error('TonConnectUI init error:', error);
                            resolve(null);
                        }
                    }
                }, 100);

                setTimeout(() => {
                    clearInterval(checkTonConnectUI);
                    resolve(null);
                }, 5000);
            });
        }

        async function handleConnect() {
            setLoading(true, 'Connecting...');
            
            try {
                if (!state.connector) {
                    state.connector = await initTonConnect();
                }

                if (!state.connector) {
                    throw new Error('TON Connect failed to load');
                }

                const wallet = await state.connector.connectWallet();
                
                if (!wallet) {
                    showToast('Connection cancelled', 'warning');
                    setLoading(false);
                    return;
                }

                state.address = wallet.account.address;
                state.connected = true;

                if (wallet.account.chain === '-3') {
                    state.network = 'testnet';
                } else {
                    state.network = 'mainnet';
                }

                await fetchBalance();
                updateUI();
                showToast('Wallet connected!', 'success');
            } catch (error) {
                console.error('Connect error:', error);
                showToast(error.message || 'Connection failed', 'error');
                state.connected = false;
            } finally {
                setLoading(false);
            }
        }

        async function fetchBalance() {
            if (!state.address) return;

            try {
                const api = CONFIG.api[state.network];
                const response = await fetch(`${api}/getAddressBalance?address=${state.address}`);
                const data = await response.json();

                if (data.ok && data.result) {
                    state.balance = parseInt(data.result) / 1e9;
                    document.getElementById('balance-display').textContent = state.balance.toFixed(2);
                }
            } catch (error) {
                console.error('Balance fetch error:', error);
                state.balance = 0;
            }
        }

        async function refreshBalance() {
            setLoading(true, 'Refreshing...');
            await fetchBalance();
            setLoading(false);
            showToast('Balance updated', 'success');
        }

        async function sendTON() {
            const address = document.getElementById('send-address').value.trim();
            const amount = document.getElementById('send-amount').value;

            if (!address) {
                showToast('Enter recipient address', 'warning');
                return;
            }

            if (!amount || parseFloat(amount) <= 0) {
                showToast('Enter valid amount', 'warning');
                return;
            }

            if (parseFloat(amount) > state.balance) {
                showToast('Insufficient balance', 'error');
                return;
            }

            if (!state.connector) {
                showToast('Wallet not connected', 'error');
                return;
            }

            setLoading(true, 'Sending transaction...');

            try {
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [
                        {
                            address: address,
                            amount: Math.floor(parseFloat(amount) * 1e9).toString()
                        }
                    ]
                };

                await state.connector.sendTransaction(transaction);

                showToast('Transaction sent!', 'success');
                document.getElementById('send-address').value = '';
                document.getElementById('send-amount').value = '';

                setTimeout(() => fetchBalance(), 3000);
            } catch (error) {
                console.error('Send error:', error);
                showToast(error.message || 'Transaction failed', 'error');
            } finally {
                setLoading(false);
            }
        }

        function copyAddress() {
            if (!state.address) {
                showToast('No address to copy', 'warning');
                return;
            }

            navigator.clipboard.writeText(state.address);
            showToast('Address copied!', 'copy');
        }

        function disconnectWallet() {
            if (state.connector) {
                try {
                    state.connector.disconnect();
                } catch (error) {
                    console.error('Disconnect error:', error);
                }
            }

            state.connected = false;
            state.address = null;
            state.balance = 0;

            updateUI();
            showToast('Disconnected', 'success');
        }

        // ===================== UI =====================
        function updateUI() {
            const connSection = document.getElementById('connection-section');
            const connectedSection = document.getElementById('connected-section');
            const statusText = document.getElementById('status-text');
            const avatar = document.getElementById('wallet-avatar');

            if (state.connected && state.address) {
                connSection.classList.add('hidden');
                connectedSection.classList.remove('hidden');
                statusText.textContent = 'Connected';
                statusText.className = 'text-sm font-semibold text-green-400';
                avatar.classList.remove('hidden');

                document.getElementById('wallet-address').value = state.address;

                document.getElementById('qr-container').innerHTML = '';
                new QRCode(document.getElementById('qr-container'), {
                    text: 'ton://transfer/' + state.address,
                    width: 200,
                    height: 200,
                    colorDark: '#FFD700',
                    colorLight: '#050816'
                });
            } else {
                connSection.classList.remove('hidden');
                connectedSection.classList.add('hidden');
                statusText.textContent = 'Disconnected';
                statusText.className = 'text-sm font-semibold text-orange-400';
                avatar.classList.add('hidden');
            }
        }

        // ===================== INIT =====================
        document.addEventListener('DOMContentLoaded', async () => {
            initNebula();
            updateUI();

            state.connector = await initTonConnect();
            if (state.connector) {
                const wallet = state.connector.wallet;
                if (wallet) {
                    state.address = wallet.account.address;
                    state.connected = true;
                    await fetchBalance();
                    updateUI();
                }
            }
        }, { once: true });
    </script>
</body>
</html>
