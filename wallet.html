<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="description" content="Minimal TON blockchain wallet with send/receive functionality.">
    <meta name="theme-color" content="#FFD700">
    <meta name="color-scheme" content="dark">
    
    <title>Neon Wallet · TON Wallet</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap">

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ton/ton@13.5.0/dist/index.umd.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        :root {
            --gold: #FFD700;
            --deep-blue: #050816;
            --card-blue: #0B1230;
            --border-blue: rgba(255, 215, 0, 0.08);
            --cyan: #00D2FF;
        }

        body {
            background: var(--deep-blue);
            color: #F8FAFC;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #nebula-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        main {
            position: relative;
            z-index: 10;
        }

        .glass {
            background: rgba(11, 18, 48, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-blue);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card {
            background: rgba(11, 18, 48, 0.35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 215, 0, 0.06);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(5, 8, 22, 0.8), 0 0 40px rgba(255, 215, 0, 0.04);
            background: rgba(11, 18, 48, 0.65);
            border-color: rgba(255, 215, 0, 0.15);
        }

        .btn-gold {
            background: linear-gradient(135deg, #FFD700 0%, #FDB931 100%);
            color: #050816;
            border: none;
            font-family: inherit;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(255, 215, 0, 0.15);
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(255, 215, 0, 0.35);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #F8FAFC;
            font-family: inherit;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 215, 0, 0.25);
            transform: translateY(-2px);
        }

        input, textarea, select {
            background: rgba(11, 18, 48, 0.6);
            border: 1px solid rgba(255, 215, 0, 0.08);
            color: #F8FAFC;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: #7A8BA8;
        }

        input:focus {
            outline: none;
            background: rgba(11, 18, 48, 0.8);
            border-color: rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 16px rgba(255, 215, 0, 0.1);
        }

        .tab-button {
            padding: 12px 24px;
            border: none;
            background: transparent;
            color: #7A8BA8;
            cursor: pointer;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            font-size: 0.875rem;
            font-family: inherit;
        }

        .tab-button.active {
            color: var(--gold);
            border-bottom-color: var(--gold);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        #toast {
            background: rgba(11, 18, 48, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        .gold-text { color: var(--gold); }
        .cyan-text { color: var(--cyan); }

        .tx-item {
            background: rgba(11, 18, 48, 0.3);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tx-item:hover {
            background: rgba(11, 18, 48, 0.5);
            border-color: rgba(255, 215, 0, 0.3);
        }

        .tx-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .tx-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tx-type.in {
            background: rgba(34, 197, 94, 0.15);
            color: #22C55E;
        }

        .tx-type.out {
            background: rgba(239, 68, 68, 0.15);
            color: #EF4444;
        }

        .tx-amount {
            font-size: 0.875rem;
            font-weight: 600;
        }

        .tx-amount.positive {
            color: #22C55E;
        }

        .tx-amount.negative {
            color: #EF4444;
        }

        .tx-details {
            font-size: 0.75rem;
            color: #7A8BA8;
        }

        .tx-hash {
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            word-break: break-all;
            opacity: 0.7;
        }

        .loader {
            border: 2px solid rgba(255, 215, 0, 0.1);
            border-top: 2px solid var(--gold);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            #nebula-canvas { display: none; }
        }
    </style>
</head>
<body>
    <canvas id="nebula-canvas"></canvas>

    <main class="py-8 md:py-12 px-4">
        <div class="max-w-2xl mx-auto">
            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-4xl md:text-5xl font-bold mb-2">
                    <span class="gold-text">Neon</span> Wallet
                </h1>
                <p class="text-slate-400 text-sm">Minimal TON wallet</p>
            </div>

            <!-- Main Container -->
            <div class="glass p-6 md:p-8 space-y-6 rounded-2xl">
                <!-- Status Bar -->
                <div class="flex items-center justify-between p-4 rounded-lg bg-slate-900/20 border border-slate-700/30">
                    <div>
                        <p class="text-xs text-slate-500 uppercase">Status</p>
                        <p class="text-sm font-semibold mt-1" id="status-text">Disconnected</p>
                    </div>
                    <div id="wallet-avatar" class="hidden w-10 h-10 rounded-full bg-gradient-to-br from-yellow-500 to-yellow-600 flex items-center justify-center">
                        <i class="fas fa-wallet text-slate-900 text-sm"></i>
                    </div>
                </div>

                <!-- Connection Section -->
                <div id="connection-section">
                    <button class="btn-gold w-full py-3 flex items-center justify-center gap-2" onclick="connectWallet()">
                        <i class="fas fa-plug"></i>
                        Connect TON Wallet
                    </button>
                </div>

                <!-- Wallet Connected Section -->
                <div id="wallet-connected-section" class="hidden space-y-6">
                    <!-- Balance Card -->
                    <div class="glass-card p-8 rounded-xl border-2 border-yellow-500/20 text-center">
                        <p class="text-sm text-slate-400 uppercase mb-2">Balance</p>
                        <p class="text-5xl font-bold gold-text" id="balance-display">0.00</p>
                        <p class="text-sm text-slate-400 mt-2">TON</p>
                    </div>

                    <!-- Address Display -->
                    <div class="glass-card p-6 rounded-xl">
                        <p class="text-xs text-slate-400 uppercase mb-2">Your Address</p>
                        <div class="flex gap-2">
                            <input type="text" id="wallet-address" readonly class="flex-1 bg-slate-900/50 font-mono text-xs" placeholder="Loading...">
                            <button class="btn-outline px-4" onclick="copyAddress()">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Tab Navigation -->
                    <div class="flex border-b border-slate-700/50">
                        <button class="tab-button active" onclick="switchTab('send', event)">Send</button>
                        <button class="tab-button" onclick="switchTab('receive', event)">Receive</button>
                        <button class="tab-button" onclick="switchTab('history', event)">History</button>
                    </div>

                    <!-- Send Tab -->
                    <div id="send" class="tab-content active space-y-4">
                        <div>
                            <label class="text-xs text-slate-400 block mb-2 uppercase">To Address</label>
                            <input type="text" id="send-address" placeholder="TON address" class="w-full">
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 block mb-2 uppercase">Amount (TON)</label>
                            <input type="number" id="send-amount" placeholder="0.00" class="w-full" step="0.01" min="0">
                        </div>
                        <button class="btn-gold w-full py-3" onclick="sendTON()">
                            <i class="fas fa-paper-plane mr-2"></i>Send
                        </button>
                    </div>

                    <!-- Receive Tab -->
                    <div id="receive" class="tab-content space-y-4">
                        <div id="qr-code" class="bg-slate-900/50 p-4 rounded-lg flex justify-center"></div>
                        <button class="btn-outline w-full py-2" onclick="copyAddress()">
                            <i class="fas fa-copy mr-2"></i>Copy Address
                        </button>
                    </div>

                    <!-- History Tab -->
                    <div id="history" class="tab-content space-y-4">
                        <div class="glass-card p-6 rounded-xl space-y-3">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="text-lg font-semibold gold-text">Transaction History</h3>
                                <button class="btn-outline px-3 py-1 text-xs" onclick="loadTransactionHistory()">
                                    <i class="fas fa-sync mr-1"></i>Refresh
                                </button>
                            </div>
                            <div id="history-loading" class="text-sm text-slate-400 text-center py-4">
                                <i class="fas fa-spinner fa-spin mr-2"></i>Loading transactions...
                            </div>
                            <div id="history-list" class="space-y-2"></div>
                            <div id="history-empty" class="text-sm text-slate-400 text-center py-4 hidden">
                                No transactions found
                            </div>
                        </div>
                    </div>

                    <!-- Disconnect -->
                    <button class="btn-outline w-full py-3" onclick="disconnectWallet()">
                        <i class="fas fa-sign-out-alt mr-2"></i>Disconnect
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 left-6 right-6 md:right-6 md:max-w-sm px-6 py-4 rounded-lg flex items-center gap-3 translate-y-20 opacity-0 pointer-events-none transition-all z-50">
        <i id="toast-icon" class="fas fa-circle-check text-xs"></i>
        <span id="toast-text" class="text-sm"></span>
    </div>

    <script>
        // ===================== CONFIG =====================
        const CONFIG = {
            nebula: {
                particleCount: 60,
                fps: 30
            },
            tonconnect: {
                manifestUrl: 'https://neon--wallet.vercel.app/tonconnect-manifest.json'
            }
        };

        // ===================== STATE =====================
        const state = {
            connected: false,
            address: null,
            balance: 0,
            wallet: null,
            connector: null
        };

        // ===================== UTILS =====================
        function showToast(message, iconClass = 'circle-check') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const textSpan = document.getElementById('toast-text');

            icon.className = `fas fa-${iconClass} text-xs`;
            textSpan.textContent = message;
            toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');

            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
            }, 3000);
        }

        function switchTab(tabName, event) {
            event.preventDefault();
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'history') {
                loadTransactionHistory();
            }
        }

        function formatAddress(addr) {
            if (!addr) return '';
            return addr.slice(0, 8) + '...' + addr.slice(-8);
        }

        // ===================== NEBULA =====================
        function initNebula() {
            const canvas = document.getElementById('nebula-canvas');
            const ctx = canvas.getContext('2d');
            if (!ctx) return;

            let width = window.innerWidth;
            let height = window.innerHeight;
            let particles = [];
            let lastFrameTime = 0;

            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
            }

            window.addEventListener('resize', resizeCanvas, { passive: true });
            resizeCanvas();

            class Particle {
                constructor() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.15;
                    this.speedY = (Math.random() - 0.5) * 0.15;
                    this.opacity = Math.random() * 0.4 + 0.1;
                    this.hue = 40 + Math.random() * 30;
                }

                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0) this.x = width;
                    if (this.x > width) this.x = 0;
                    if (this.y < 0) this.y = height;
                    if (this.y > height) this.y = 0;
                }

                draw(ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${this.opacity})`;
                    ctx.shadowColor = `hsla(${this.hue}, 80%, 70%, 0.2)`;
                    ctx.shadowBlur = 12;
                    ctx.fill();
                }
            }

            for (let i = 0; i < CONFIG.nebula.particleCount; i++) {
                particles.push(new Particle());
            }

            function animate(currentTime) {
                if (currentTime - lastFrameTime < 1000 / CONFIG.nebula.fps) {
                    requestAnimationFrame(animate);
                    return;
                }

                lastFrameTime = currentTime;
                ctx.clearRect(0, 0, width, height);

                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw(ctx);
                }

                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, width * 0.6);
                grad.addColorStop(0, 'rgba(255,215,0,0.02)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);

                requestAnimationFrame(animate);
            }

            requestAnimationFrame(animate);
        }

        // ===================== TON CONNECT =====================
        function initTonConnect() {
            const TonConnectUIClass =
                window.TON_CONNECT_UI?.TonConnectUI ||
                window.TonConnectUI ||
                null;

            if (!TonConnectUIClass) {
                showToast('Wallet SDK failed to load — try refreshing.', 'exclamation');
                return;
            }

            try {
                state.connector = new TonConnectUIClass({
                    manifestUrl: CONFIG.tonconnect.manifestUrl,
                    buttonRootId: null
                });

                state.connector.onStatusChange(async wallet => {
                    if (wallet) {
                        state.address = wallet.account.address;
                        state.wallet = wallet;
                        state.connected = true;
                        
                        // Fetch balance from TON
                        await fetchBalance();
                        updateUI();
                    } else {
                        state.address = null;
                        state.wallet = null;
                        state.connected = false;
                        updateUI();
                    }
                });
            } catch (error) {
                console.warn('TON Connect init failed:', error);
                showToast('Wallet init failed.', 'exclamation');
            }
        }

        function connectWallet() {
            if (!state.connector) {
                showToast('Wallet SDK unavailable.', 'exclamation');
                return;
            }
            state.connector.openModal().catch(error => 
                showToast('Wallet error: ' + error.message, 'exclamation')
            );
        }

        async function fetchBalance() {
            if (!state.address) return;

            try {
                // Using TON Center API
                const response = await fetch(`https://testnet.toncenter.com/api/v2/getAddressBalance?address=${state.address}`);
                const data = await response.json();

                if (data.ok) {
                    // Convert from nanotons to TON
                    state.balance = parseInt(data.result) / 1e9;
                } else {
                    state.balance = 0;
                }
            } catch (error) {
                console.error('Balance fetch error:', error);
                state.balance = 0;
            }
        }

        async function sendTON() {
            const address = document.getElementById('send-address').value.trim();
            const amount = document.getElementById('send-amount').value;

            if (!address || !amount) {
                showToast('Please fill all fields', 'exclamation');
                return;
            }

            if (!state.connector) {
                showToast('Wallet not connected', 'exclamation');
                return;
            }

            try {
                showToast('Preparing transaction...', 'hourglass-end');

                // Create transaction
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [
                        {
                            address: address,
                            amount: (parseFloat(amount) * 1e9).toString(),
                            payload: undefined
                        }
                    ]
                };

                const result = await state.connector.sendTransaction(transaction);

                showToast('Transaction sent!', 'circle-check');
                document.getElementById('send-address').value = '';
                document.getElementById('send-amount').value = '';

                // Refresh balance
                setTimeout(() => fetchBalance(), 2000);
            } catch (error) {
                console.error('Send error:', error);
                showToast('Transaction failed: ' + error.message, 'exclamation');
            }
        }

        function copyAddress() {
            if (!state.address) {
                showToast('No address to copy', 'exclamation');
                return;
            }

            navigator.clipboard.writeText(state.address);
            showToast('Address copied!', 'circle-check');
        }

        function disconnectWallet() {
            state.connector?.disconnect().catch(() => {});
            showToast('Wallet disconnected', 'sign-out-alt');
        }

        // ===================== TRANSACTION HISTORY & TON ASSETS =====================
        let _tonPriceCache = { price: 0, timestamp: 0 };
        const TON_PRICE_CACHE_MS = 60000;

        async function getTonPriceUSD() {
            const now = Date.now();
            if (_tonPriceCache.price > 0 && (now - _tonPriceCache.timestamp) < TON_PRICE_CACHE_MS) {
                return _tonPriceCache.price;
            }

            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ton&vs_currencies=usd', {
                    method: 'GET',
                    cache: 'no-cache'
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const price = data?.ton?.usd || 0;
                    if (price > 0) {
                        _tonPriceCache = { price, timestamp: now };
                        return price;
                    }
                }
            } catch (e) {
                console.warn('TON price fetch failed:', e.message);
            }
            return _tonPriceCache.price || 0;
        }

        function formatUSD(value) {
            return '$' + parseFloat(value || 0).toFixed(2);
        }

        function tonExplorerLink(hash) {
            return 'https://tonscan.org/tx/' + hash;
        }

        async function loadTransactionHistory() {
            if (!state.address) {
                document.getElementById('history-empty').classList.remove('hidden');
                document.getElementById('history-loading').classList.add('hidden');
                document.getElementById('history-list').innerHTML = '';
                return;
            }

            document.getElementById('history-loading').classList.remove('hidden');
            document.getElementById('history-list').innerHTML = '';
            document.getElementById('history-empty').classList.add('hidden');

            try {
                const tonPrice = await getTonPriceUSD();
                
                // Fetch transactions from TonCenter API
                const response = await fetch(
                    `https://toncenter.com/api/v3/transactions?account=${state.address}&limit=30&sort=desc`,
                    { method: 'GET' }
                );

                if (!response.ok) throw new Error('Failed to fetch transactions');

                const data = await response.json();
                const transactions = data?.transactions || [];

                document.getElementById('history-loading').classList.add('hidden');

                if (transactions.length === 0) {
                    document.getElementById('history-empty').classList.remove('hidden');
                    return;
                }

                const historyList = document.getElementById('history-list');
                historyList.innerHTML = transactions.map(tx => {
                    const hash = tx.hash || tx.transaction_id || '';
                    const time = new Date(tx.utime * 1000).toLocaleString();
                    
                    // Calculate amounts from out_messages and in_message
                    let amount = 0;
                    let type = 'in';
                    
                    if (tx.out_messages && tx.out_messages.length > 0) {
                        const outMsg = tx.out_messages[0];
                        amount = parseInt(outMsg.value || 0) / 1e9; // Convert from nanotons
                        type = 'out';
                    }
                    
                    if (tx.in_message && tx.in_message.value) {
                        amount = parseInt(tx.in_message.value) / 1e9;
                        type = 'in';
                    }

                    const usdValue = tonPrice > 0 ? amount * tonPrice : 0;
                    const amountText = type === 'out' ? '-' + amount.toFixed(4) : '+' + amount.toFixed(4);
                    const amountClass = type === 'out' ? 'negative' : 'positive';

                    return `<div class="tx-item" onclick="window.open('${tonExplorerLink(hash)}', '_blank')">
                        <div class="tx-item-header">
                            <div>
                                <span class="tx-type ${type}">${type === 'out' ? 'Send' : 'Receive'}</span>
                            </div>
                            <div class="tx-amount ${amountClass}">${amountText} TON</div>
                        </div>
                        <div class="tx-details">
                            ${time}${tonPrice > 0 ? ' · ' + formatUSD(usdValue) : ''}
                        </div>
                        <div class="tx-hash">${hash}</div>
                    </div>`;
                }).join('');

            } catch (error) {
                console.error('Transaction history error:', error);
                document.getElementById('history-loading').classList.add('hidden');
                document.getElementById('history-empty').classList.remove('hidden');
            }
        }

        // ===================== UI UPDATE =====================
        function updateUI() {
            const connSection = document.getElementById('connection-section');
            const connectedSection = document.getElementById('wallet-connected-section');
            const statusText = document.getElementById('status-text');
            const avatar = document.getElementById('wallet-avatar');

            if (state.connected && state.address) {
                connSection.classList.add('hidden');
                connectedSection.classList.remove('hidden');
                statusText.textContent = 'Connected';
                statusText.className = 'text-sm font-semibold text-green-400';
                avatar.classList.remove('hidden');

                document.getElementById('wallet-address').value = state.address;
                document.getElementById('balance-display').textContent = state.balance.toFixed(2);

                // Generate QR
                document.getElementById('qr-code').innerHTML = '';
                new QRCode(document.getElementById('qr-code'), {
                    text: state.address,
                    width: 150,
                    height: 150,
                    colorDark: '#FFD700',
                    colorLight: '#0B1230',
                    correctLevel: QRCode.CorrectLevel.H
                });
            } else {
                connSection.classList.remove('hidden');
                connectedSection.classList.add('hidden');
                statusText.textContent = 'Disconnected';
                statusText.className = 'text-sm font-semibold text-orange-400';
                avatar.classList.add('hidden');
            }
        }

        // ===================== INIT =====================
        document.addEventListener('DOMContentLoaded', () => {
            initNebula();
            initTonConnect();
            updateUI();
        }, { once: true });
    </script>
</body>
</html>
